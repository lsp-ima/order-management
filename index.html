<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>発注管理アプリ</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; background: #f4f5f7; color: #222; }
  header { background: #263238; color: #fff; padding: 14px 20px; }
  header h1 { font-size: 16px; margin: 0; }
  nav { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
  nav button { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 14px; color: #555; border-bottom: 3px solid transparent; }
  nav button.active { color: #1565c0; border-bottom-color: #1565c0; font-weight: bold; }
  main { padding: 16px; max-width: 1150px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }
  table { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; }
  th, td { border: 1px solid #e0e0e0; padding: 6px 8px; text-align: left; white-space: nowrap; }
  th { background: #eceff1; position: sticky; top: 0; }
  tr.overdue { background: #ffe0e0; }
  tr.soon { background: #fff6d6; }
  .table-wrap { overflow-x: auto; max-height: 70vh; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; background: #e0e0e0; }
  form.card { background: #fff; padding: 20px; border-radius: 6px; max-width: 720px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  h3.section-title { font-size: 14px; color: #1565c0; margin: 18px 0 10px; border-bottom: 1px solid #dbe7f7; padding-bottom: 4px; }
  .item-row { border: 1px solid #ddd; border-radius: 6px; padding: 14px; margin-bottom: 12px; background: #fafbfc; }
  button.primary { background: #1565c0; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; }
  button.primary:hover { background: #0d47a1; }
  button.secondary { background: #fff; color: #1565c0; border: 1px solid #1565c0; padding: 8px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; }
  button.danger { background: #fff; color: #c62828; border: 1px solid #c62828; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .msg { margin-top: 10px; font-size: 13px; }
  .msg.ok { color: #2e7d32; }
  .msg.err { color: #c62828; }
  select.status-select { font-size: 12px; padding: 3px; }
  .small-btn { font-size: 11px; padding: 3px 8px; cursor: pointer; }
  .toolbar { margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
  .loading { color: #888; padding: 20px; text-align: center; }

  #gate { position: fixed; inset: 0; background: #263238; display: flex; align-items: center; justify-content: center; z-index: 999; }
  #gate .box { background: #fff; padding: 30px; border-radius: 8px; width: 300px; text-align: center; }
  #gate input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; margin: 12px 0; text-align: center; }
  #gate .err { color: #c62828; font-size: 13px; min-height: 18px; }
  #app { display: none; }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div style="font-weight:bold; margin-bottom:8px;">発注管理アプリ</div>
    <div>合言葉を入力してください</div>
    <input id="gateInput" type="password" placeholder="合言葉">
    <button class="primary" onclick="submitGate()">開く</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div id="app">
  <header><h1>発注管理アプリ</h1></header>
  <nav>
    <button class="active" data-panel="dashboard">ダッシュボード</button>
    <button data-panel="register">新規登録</button>
    <button data-panel="list">一覧・編集</button>
  </nav>
  <main>
    <section id="dashboard" class="panel active">
      <div class="toolbar">
        <button class="small-btn" onclick="reloadOrders()">再読み込み</button>
        <span id="dashSummary"></span>
      </div>
      <div class="table-wrap">
        <table id="dashTable">
          <thead>
            <tr>
              <th>発注すべき日</th><th>納期</th><th>学校</th><th>部活動</th><th>商品</th><th>メーカー</th>
              <th>アサスポ担当</th><th>メーカー担当</th><th>学校担当</th><th>ステータス</th><th>連絡済み</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="register" class="panel">
      <form class="card" id="registerForm" onsubmit="submitRegister(event)">
        <h3 class="section-title">案件情報</h3>
        <div class="row2">
          <div class="field">
            <label>学校</label>
            <select id="r_school"></select>
          </div>
          <div class="field">
            <label>部活動</label>
            <select id="r_club"></select>
          </div>
        </div>
        <div class="row3">
          <div class="field">
            <label>単位</label>
            <select id="r_unit"></select>
          </div>
          <div class="field">
            <label>名前(選手名・クラス名・学校名など)</label>
            <input id="r_name" type="text">
          </div>
          <div class="field">
            <label>人数(分かれば)</label>
            <input id="r_count" type="number" min="0">
          </div>
        </div>
        <div class="row3">
          <div class="field">
            <label>アサスポ担当</label>
            <input id="r_staffAsahi" type="text">
          </div>
          <div class="field">
            <label>メーカー担当</label>
            <input id="r_staffMaker" type="text">
          </div>
          <div class="field">
            <label>学校担当</label>
            <input id="r_staffSchool" type="text">
          </div>
        </div>
        <div class="field">
          <label>案件備考</label>
          <textarea id="r_caseNote" rows="2"></textarea>
        </div>

        <h3 class="section-title">商品明細（複数追加できます）</h3>
        <div id="itemRows"></div>
        <button type="button" class="secondary" onclick="addItemRow()">＋ 商品を追加</button>

        <div style="margin-top:20px;">
          <button class="primary" type="submit">登録する</button>
        </div>
        <div id="registerMsg" class="msg"></div>
      </form>
    </section>

    <section id="list" class="panel">
      <div class="toolbar">
        <button class="small-btn" onclick="reloadOrders()">再読み込み</button>
      </div>
      <div class="table-wrap">
        <table id="listTable">
          <thead>
            <tr>
              <th>学校</th><th>部活動</th><th>単位</th><th>名前/人数</th><th>商品</th><th>メーカー</th>
              <th>数量</th><th>アサスポ担当</th><th>メーカー担当</th><th>学校担当</th><th>納期</th><th>発注すべき日</th>
              <th>ステータス</th><th>検品結果</th><th>連絡済み</th><th>備考</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script>
/* ここに、GASをデプロイしたときに発行されたWebアプリのURLを入れてください */
const API_URL = 'https://script.google.com/macros/s/AKfycbxjZKqRBPGdXnRBDlH12WR1UNEmPI85pOY2wdE5lQ-VtlS8dyEDDZAGGueniLAJa4QU8A/exec';

const GATE_KEY = 'orderAppGateOk';

function submitGate() {
  const val = document.getElementById('gateInput').value;
  const err = document.getElementById('gateErr');
  err.textContent = '確認中...';
  fetch(`${API_URL}?action=checkPassword&password=${encodeURIComponent(val)}`)
    .then(r => r.json())
    .then(res => {
      if (res.ok) {
        localStorage.setItem(GATE_KEY, '1');
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        init();
      } else {
        err.textContent = '合言葉が違います';
      }
    })
    .catch(() => { err.textContent = '通信エラーが発生しました'; });
}

function checkGateOnLoad() {
  if (localStorage.getItem(GATE_KEY) === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }
}

let MASTERS = null;
let ORDERS = [];

function switchPanel(name) {
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.panel === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === name));
}
document.querySelectorAll('nav button').forEach(b => b.addEventListener('click', () => switchPanel(b.dataset.panel)));

function init() {
  fetch(`${API_URL}?action=getMasters`)
    .then(r => r.json())
    .then(masters => {
      MASTERS = masters;
      fillSelectEl(document.getElementById('r_school'), masters.schools);
      fillSelectEl(document.getElementById('r_club'), masters.clubs);
      fillSelectEl(document.getElementById('r_unit'), masters.units);
      document.getElementById('itemRows').innerHTML = '';
      addItemRow();
      reloadOrders();
    });
}

function fillSelectEl(el, list) {
  el.innerHTML = (list || []).map(v => `<option value="${v}">${v}</option>`).join('');
}

function val(id) { return document.getElementById(id).value; }

function itemRowHtml() {
  return `
    <div class="row2">
      <div class="field">
        <label>商品</label>
        <select class="it_item" onchange="onItemRowItemChange(this)"></select>
      </div>
      <div class="field">
        <label>メーカー</label>
        <select class="it_maker"></select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>数量</label>
        <input class="it_qty" type="number" min="1" value="1">
      </div>
      <div class="field">
        <label>発注日(任意)</label>
        <input class="it_orderDate" type="date">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>リードタイム(日)</label>
        <input class="it_leadTime" type="number" min="0">
      </div>
      <div class="field">
        <label>納期</label>
        <input class="it_deadline" type="date">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>ステータス</label>
        <select class="it_status"></select>
      </div>
      <div class="field">
        <label>商品備考</label>
        <input class="it_note" type="text">
      </div>
    </div>
    <button type="button" class="danger" onclick="removeItemRow(this)">－ この商品を削除</button>
  `;
}

function addItemRow() {
  const container = document.getElementById('itemRows');
  const div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML = itemRowHtml();
  container.appendChild(div);
  const itemSelect = div.querySelector('.it_item');
  fillSelectEl(itemSelect, MASTERS.items);
  fillSelectEl(div.querySelector('.it_status'), MASTERS.statuses);
  onItemRowItemChange(itemSelect);
}

function removeItemRow(btn) {
  const rows = document.querySelectorAll('.item-row');
  if (rows.length <= 1) { alert('商品は最低1つ必要です'); return; }
  btn.closest('.item-row').remove();
}

function onItemRowItemChange(selectEl) {
  const row = selectEl.closest('.item-row');
  const makers = MASTERS.makersByItem[selectEl.value] || [];
  fillSelectEl(row.querySelector('.it_maker'), makers);
}

function submitRegister(e) {
  e.preventDefault();
  const caseData = {
    school: val('r_school'), club: val('r_club'), unit: val('r_unit'),
    name: val('r_name'), count: val('r_count'),
    staffAsahi: val('r_staffAsahi'), staffMaker: val('r_staffMaker'), staffSchool: val('r_staffSchool'),
    note: val('r_caseNote')
  };
  const items = Array.from(document.querySelectorAll('.item-row')).map(row => ({
    item: row.querySelector('.it_item').value,
    maker: row.querySelector('.it_maker').value,
    qty: row.querySelector('.it_qty').value,
    orderDate: row.querySelector('.it_orderDate').value,
    leadTime: row.querySelector('.it_leadTime').value,
    deadline: row.querySelector('.it_deadline').value,
    status: row.querySelector('.it_status').value,
    note: row.querySelector('.it_note').value
  }));

  const msg = document.getElementById('registerMsg');
  msg.textContent = '登録中...';
  msg.className = 'msg';
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'addCase', caseData, items })
  })
    .then(r => r.json())
    .then(res => {
      if (res.ok) {
        msg.textContent = '登録しました';
        msg.className = 'msg ok';
        document.getElementById('r_name').value = '';
        document.getElementById('r_count').value = '';
        document.getElementById('r_staffAsahi').value = '';
        document.getElementById('r_staffMaker').value = '';
        document.getElementById('r_staffSchool').value = '';
        document.getElementById('r_caseNote').value = '';
        document.getElementById('itemRows').innerHTML = '';
        addItemRow();
        reloadOrders();
      } else {
        msg.textContent = 'エラー: ' + (res.error || '不明なエラー');
        msg.className = 'msg err';
      }
    })
    .catch(err => {
      msg.textContent = '通信エラー: ' + err.message;
      msg.className = 'msg err';
    });
}

function reloadOrders() {
  fetch(`${API_URL}?action=getOrders`)
    .then(r => r.json())
    .then(orders => {
      ORDERS = orders;
      renderDashboard();
      renderList();
    });
}

function daysDiff(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

const OPEN_STATUSES = ['未発注','見積依頼中','見積回答待ち','学校・選手へ注文確認中','発注済','入荷待ち'];

function renderDashboard() {
  const rows = ORDERS
    .filter(o => o.shouldOrderDate && OPEN_STATUSES.indexOf(o.status) !== -1)
    .sort((a, b) => a.shouldOrderDate.localeCompare(b.shouldOrderDate));
  const tbody = document.querySelector('#dashTable tbody');
  tbody.innerHTML = rows.map(o => {
    const diff = daysDiff(o.shouldOrderDate);
    const cls = diff !== null && diff < 0 ? 'overdue' : (diff !== null && diff <= 3 ? 'soon' : '');
    return `<tr class="${cls}">
      <td>${o.shouldOrderDate}</td><td>${o.deadline}</td><td>${o.school}</td><td>${o.club}</td>
      <td>${o.item}</td><td>${o.maker}</td>
      <td>${o.staffAsahi||''}</td><td>${o.staffMaker||''}</td><td>${o.staffSchool||''}</td>
      <td><span class="badge">${o.status}</span></td><td>${o.contacted || ''}</td>
    </tr>`;
  }).join('');
  document.getElementById('dashSummary').textContent = `対象 ${rows.length} 件`;
}

function renderList() {
  const tbody = document.querySelector('#listTable tbody');
  tbody.innerHTML = ORDERS.map(o => {
    const statusOptions = MASTERS.statuses.map(s => `<option value="${s}" ${s===o.status?'selected':''}>${s}</option>`).join('');
    return `<tr data-row="${o.row}">
      <td>${o.school}</td><td>${o.club}</td><td>${o.unit}</td>
      <td>${o.name||''}${o.count ? '('+o.count+'人)' : ''}</td>
      <td>${o.item}</td><td>${o.maker}</td><td>${o.qty}</td>
      <td>${o.staffAsahi||''}</td><td>${o.staffMaker||''}</td><td>${o.staffSchool||''}</td>
      <td>${o.deadline}</td><td>${o.shouldOrderDate}</td>
      <td><select class="status-select" onchange="updateField(${o.row},'status',this.value)">${statusOptions}</select></td>
      <td><input type="text" value="${o.inspection||''}" style="width:80px" onchange="updateField(${o.row},'inspection',this.value)"></td>
      <td>
        <select onchange="updateField(${o.row},'contacted',this.value)">
          <option value="" ${!o.contacted?'selected':''}></option>
          <option value="済" ${o.contacted==='済'?'selected':''}>済</option>
        </select>
      </td>
      <td><input type="text" value="${o.note||''}" style="width:120px" onchange="updateField(${o.row},'note',this.value)"></td>
    </tr>`;
  }).join('');
}

function updateField(row, field, value) {
  const order = ORDERS.find(o => o.row === row);
  if (!order) return;
  order[field] = value;
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'updateItem', row, data: order })
  })
    .then(r => r.json())
    .then(() => reloadOrders());
}

checkGateOnLoad();
</script>
</body>
</html>
